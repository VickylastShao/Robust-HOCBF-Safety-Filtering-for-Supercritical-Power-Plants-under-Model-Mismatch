phase: 2
name: "Robustness Injection — Double Integrator with Model Mismatch"

environment:
  type: "double_integrator"
  dt: 0.01
  u_max: 5.0
  horizon: 500
  keepout_radius: 1.0
  uncertainty_scenarios: [null, "damping", "periodic", "coupled", "nonlinear"]

hocbf:
  relative_degree: 2
  k_gains: [2.0, 2.0]

gp:
  n_dims: 2
  kernel: "matern52"
  noise_variance: 1.0e-4
  n_pretrain_transitions: 5000
  update_interval: 50
  delta: 0.01

ppo:
  hidden_dim: 64
  lr: 3.0e-4
  clip_eps: 0.2
  gamma: 0.99
  lam: 0.95
  epochs: 4
  minibatch_size: 64
  entropy_coef: 0.01
  value_coef: 0.5

training:
  n_episodes: 1000
  n_steps: 500
  eval_every: 50
  n_eval_episodes: 10
  readaptation_episodes: 10
  readaptation_lr_factor: 0.5
  seed: 42

exit_criteria:
  robust_violation_rate: 0.01
  traditional_violation_rate: 0.10
  gp_coverage: [0.90, 0.98]
  epsilon_oracle_ratio: 2.0
